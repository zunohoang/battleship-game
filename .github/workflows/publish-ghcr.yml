name: Build and Publish Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  publish-client:
    name: Publish client image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract client image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/p_btship-client
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-server:
    name: Publish server image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract server image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/p_btship-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs:
      - publish-client
      - publish-server
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: docker-compose.prod.yml
          target: ${{ secrets.SERVER_DEPLOY_PATH }}

      - name: Deploy containers over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/p_btship-server:latest
          CLIENT_IMAGE: ghcr.io/${{ github.repository_owner }}/p_btship-client:latest
          PORT: ${{ vars.PORT }}
          CLIENT_PORT: ${{ vars.CLIENT_PORT }}
          CLIENT_URL: ${{ secrets.CLIENT_URL }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          ACCESS_TOKEN_EXPIRES_IN: ${{ vars.ACCESS_TOKEN_EXPIRES_IN }}
          REFRESH_TOKEN_EXPIRES_IN: ${{ vars.REFRESH_TOKEN_EXPIRES_IN }}
          REFRESH_TOKEN_ABSOLUTE_TTL_DAYS: ${{ vars.REFRESH_TOKEN_ABSOLUTE_TTL_DAYS }}
          REFRESH_TOKEN_COOKIE_NAME: ${{ vars.REFRESH_TOKEN_COOKIE_NAME }}
          REFRESH_TOKEN_COOKIE_MAX_AGE_MS: ${{ vars.REFRESH_TOKEN_COOKIE_MAX_AGE_MS }}
          COOKIE_SECURE: ${{ vars.COOKIE_SECURE }}
          COOKIE_SAME_SITE: ${{ vars.COOKIE_SAME_SITE }}
          COOKIE_PATH: ${{ vars.COOKIE_PATH }}
          COOKIE_DOMAIN: ${{ vars.COOKIE_DOMAIN }}
          DB_SYNCHRONIZE: ${{ vars.DB_SYNCHRONIZE }}
          DB_LOGGING: ${{ vars.DB_LOGGING }}
          REDIS_DB: ${{ vars.REDIS_DB }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          CHAT_HISTORY_LIMIT: ${{ vars.CHAT_HISTORY_LIMIT }}
          CHAT_HISTORY_TTL_SECONDS: ${{ vars.CHAT_HISTORY_TTL_SECONDS }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          SHOPAIKEY_API_KEY: ${{ secrets.SHOPAIKEY_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          envs: SERVER_IMAGE,CLIENT_IMAGE,PORT,CLIENT_PORT,CLIENT_URL,DB_PORT,DB_NAME,DB_USER,DB_PASSWORD,JWT_SECRET,JWT_REFRESH_SECRET,ACCESS_TOKEN_EXPIRES_IN,REFRESH_TOKEN_EXPIRES_IN,REFRESH_TOKEN_ABSOLUTE_TTL_DAYS,REFRESH_TOKEN_COOKIE_NAME,REFRESH_TOKEN_COOKIE_MAX_AGE_MS,COOKIE_SECURE,COOKIE_SAME_SITE,COOKIE_PATH,COOKIE_DOMAIN,DB_SYNCHRONIZE,DB_LOGGING,REDIS_DB,REDIS_PASSWORD,CHAT_HISTORY_LIMIT,CHAT_HISTORY_TTL_SECONDS,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -eu

            missing_vars=""

            require_env() {
              var_name="$1"
              eval "var_value=\${$var_name-}"
              if [ -z "$var_value" ]; then
                echo "ERROR: Missing required env: $var_name" >&2
                missing_vars="$missing_vars $var_name"
              fi
            }

            for v in \
              SERVER_IMAGE CLIENT_IMAGE \
              PORT CLIENT_PORT CLIENT_URL DB_PORT \
              DB_NAME DB_USER DB_PASSWORD \
              JWT_SECRET JWT_REFRESH_SECRET \
              ACCESS_TOKEN_EXPIRES_IN REFRESH_TOKEN_EXPIRES_IN \
              REFRESH_TOKEN_ABSOLUTE_TTL_DAYS \
              REFRESH_TOKEN_COOKIE_NAME REFRESH_TOKEN_COOKIE_MAX_AGE_MS \
              COOKIE_SECURE COOKIE_SAME_SITE COOKIE_PATH COOKIE_DOMAIN \
              DB_SYNCHRONIZE DB_LOGGING \
              REDIS_DB REDIS_PASSWORD \
              CHAT_HISTORY_LIMIT CHAT_HISTORY_TTL_SECONDS \
              GHCR_USERNAME GHCR_TOKEN
            do
              require_env "$v"
            done

            if [ -n "$missing_vars" ]; then
              echo "Deployment aborted. Missing envs:$missing_vars" >&2
              exit 1
            fi
            mkdir -p "${{ secrets.SERVER_DEPLOY_PATH }}"
            cd "${{ secrets.SERVER_DEPLOY_PATH }}"
            cat > .env.production <<EOF
            SERVER_IMAGE=ghcr.io/${{ github.repository_owner }}/p_btship-server:latest
            CLIENT_IMAGE=ghcr.io/${{ github.repository_owner }}/p_btship-client:latest
            PORT=${PORT}
            CLIENT_PORT=${CLIENT_PORT}
            CLIENT_URL=${CLIENT_URL}
            DB_PORT=${DB_PORT}
            DB_NAME=${DB_NAME}
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
            ACCESS_TOKEN_EXPIRES_IN=${ACCESS_TOKEN_EXPIRES_IN}
            REFRESH_TOKEN_EXPIRES_IN=${REFRESH_TOKEN_EXPIRES_IN}
            REFRESH_TOKEN_ABSOLUTE_TTL_DAYS=${REFRESH_TOKEN_ABSOLUTE_TTL_DAYS}
            REFRESH_TOKEN_COOKIE_NAME=${REFRESH_TOKEN_COOKIE_NAME}
            REFRESH_TOKEN_COOKIE_MAX_AGE_MS=${REFRESH_TOKEN_COOKIE_MAX_AGE_MS}
            COOKIE_SECURE=${COOKIE_SECURE}
            COOKIE_SAME_SITE=${COOKIE_SAME_SITE}
            COOKIE_PATH=${COOKIE_PATH}
            COOKIE_DOMAIN=${COOKIE_DOMAIN}
            DB_SYNCHRONIZE=${DB_SYNCHRONIZE}
            DB_LOGGING=${DB_LOGGING}
            REDIS_DB=${REDIS_DB}
            REDIS_PASSWORD=${REDIS_PASSWORD}
            CHAT_HISTORY_LIMIT=${CHAT_HISTORY_LIMIT}
            CHAT_HISTORY_TTL_SECONDS=${CHAT_HISTORY_TTL_SECONDS}
            EOF
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            docker compose --env-file .env.production -f docker-compose.prod.yml pull

            # Ensure database is ready, then run migrations before app rollout.
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d postgres
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --force-recreate redis
            docker compose --env-file .env.production -f docker-compose.prod.yml run --rm server npx typeorm -d dist/database/data-source.js migration:run

            docker compose --env-file .env.production -f docker-compose.prod.yml up -d server client