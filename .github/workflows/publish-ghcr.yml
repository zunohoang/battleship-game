name: Build and Publish Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  publish-client:
    name: Publish client image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract client image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/p_btship-client
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL || format('http://{0}:3000', secrets.SERVER_HOST) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-server:
    name: Publish server image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract server image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/p_btship-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs:
      - publish-client
      - publish-server
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: docker-compose.prod.yml
          target: ${{ secrets.SERVER_DEPLOY_PATH }}

      - name: Deploy containers over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/p_btship-server:latest
          CLIENT_IMAGE: ghcr.io/${{ github.repository_owner }}/p_btship-client:latest
          PORT: ${{ vars.PORT || '3000' }}
          CLIENT_PORT: ${{ vars.CLIENT_PORT || '8080' }}
          CLIENT_URL: ${{ vars.CLIENT_URL || format('http://{0}', secrets.SERVER_HOST) }}
          DB_PORT: ${{ vars.DB_PORT || '5432' }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          ACCESS_TOKEN_EXPIRES_IN: ${{ vars.ACCESS_TOKEN_EXPIRES_IN || '1h' }}
          REFRESH_TOKEN_EXPIRES_IN: ${{ vars.REFRESH_TOKEN_EXPIRES_IN || '30d' }}
          REFRESH_TOKEN_ABSOLUTE_TTL_DAYS: ${{ vars.REFRESH_TOKEN_ABSOLUTE_TTL_DAYS || '180' }}
          REFRESH_TOKEN_COOKIE_NAME: ${{ vars.REFRESH_TOKEN_COOKIE_NAME || 'refresh_token' }}
          REFRESH_TOKEN_COOKIE_MAX_AGE_MS: ${{ vars.REFRESH_TOKEN_COOKIE_MAX_AGE_MS || '2592000000' }}
          COOKIE_SECURE: ${{ vars.COOKIE_SECURE || 'true' }}
          COOKIE_SAME_SITE: ${{ vars.COOKIE_SAME_SITE || 'lax' }}
          COOKIE_PATH: ${{ vars.COOKIE_PATH || '/' }}
          COOKIE_DOMAIN: ${{ vars.COOKIE_DOMAIN || '' }}
          DB_SYNCHRONIZE: ${{ vars.DB_SYNCHRONIZE || 'false' }}
          DB_LOGGING: ${{ vars.DB_LOGGING || 'false' }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          envs: SERVER_IMAGE,CLIENT_IMAGE,PORT,CLIENT_PORT,CLIENT_URL,DB_PORT,DB_NAME,DB_USER,DB_PASSWORD,JWT_SECRET,JWT_REFRESH_SECRET,ACCESS_TOKEN_EXPIRES_IN,REFRESH_TOKEN_EXPIRES_IN,REFRESH_TOKEN_ABSOLUTE_TTL_DAYS,REFRESH_TOKEN_COOKIE_NAME,REFRESH_TOKEN_COOKIE_MAX_AGE_MS,COOKIE_SECURE,COOKIE_SAME_SITE,COOKIE_PATH,COOKIE_DOMAIN,DB_SYNCHRONIZE,DB_LOGGING,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -eu
            mkdir -p "${{ secrets.SERVER_DEPLOY_PATH }}"
            cd "${{ secrets.SERVER_DEPLOY_PATH }}"
            cat > .env.production <<EOF
            SERVER_IMAGE=${SERVER_IMAGE}
            CLIENT_IMAGE=${CLIENT_IMAGE}
            PORT=${PORT}
            CLIENT_PORT=${CLIENT_PORT}
            CLIENT_URL=${CLIENT_URL}
            DB_PORT=${DB_PORT}
            DB_NAME=${DB_NAME}
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
            ACCESS_TOKEN_EXPIRES_IN=${ACCESS_TOKEN_EXPIRES_IN}
            REFRESH_TOKEN_EXPIRES_IN=${REFRESH_TOKEN_EXPIRES_IN}
            REFRESH_TOKEN_ABSOLUTE_TTL_DAYS=${REFRESH_TOKEN_ABSOLUTE_TTL_DAYS}
            REFRESH_TOKEN_COOKIE_NAME=${REFRESH_TOKEN_COOKIE_NAME}
            REFRESH_TOKEN_COOKIE_MAX_AGE_MS=${REFRESH_TOKEN_COOKIE_MAX_AGE_MS}
            COOKIE_SECURE=${COOKIE_SECURE}
            COOKIE_SAME_SITE=${COOKIE_SAME_SITE}
            COOKIE_PATH=${COOKIE_PATH}
            COOKIE_DOMAIN=${COOKIE_DOMAIN}
            DB_SYNCHRONIZE=${DB_SYNCHRONIZE}
            DB_LOGGING=${DB_LOGGING}
            EOF
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            docker compose --env-file .env.production -f docker-compose.prod.yml pull
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d