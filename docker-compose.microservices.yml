services:
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: battleship_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

  postgres-account:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: battleship_account
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5434:5432'
    volumes:
      - postgres_account_data:/var/lib/postgresql/data

  postgres-game:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: battleship_game
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5435:5432'
    volumes:
      - postgres_game_data:/var/lib/postgresql/data

  postgres-forum:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: battleship_forum
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5436:5432'
    volumes:
      - postgres_forum_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "myredispassword"]
    ports:
      - '6380:6379'

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      NODE_ENV: development
      CLIENT_URL: http://localhost:5173,http://localhost:8088
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-jwt-refresh-secret-change-in-production
      ACCESS_TOKEN_EXPIRES_IN: 1h
      REFRESH_TOKEN_EXPIRES_IN: 30d
      REFRESH_TOKEN_ABSOLUTE_TTL_DAYS: 180
      GRPC_ENABLED: true
      GRPC_AUTH_BIND_URL: 0.0.0.0:50051
      REFRESH_TOKEN_COOKIE_NAME: refresh_token
      REFRESH_TOKEN_COOKIE_MAX_AGE_MS: 2592000000
      COOKIE_SECURE: false
      COOKIE_SAME_SITE: lax
      COOKIE_PATH: /
      COOKIE_DOMAIN: ''
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_NAME: battleship_auth
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SYNCHRONIZE: false
      DB_LOGGING: false
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: myredispassword
      CHAT_HISTORY_LIMIT: 80
      CHAT_HISTORY_TTL_SECONDS: 43200
      SHOPAIKEY_API_KEY: ''
      SHOPAIKEY_GENAI_BASE_URL: https://api.shopaikey.com
      SHOPAIKEY_GENAI_MODEL: gemini-2.5-flash
    depends_on:
      - postgres-auth
      - redis
    ports:
      - '3001:3000'
      - '50051:50051'

  account-service:
    build:
      context: ./services/account-service
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      NODE_ENV: development
      CLIENT_URL: http://localhost:5173,http://localhost:8088
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-jwt-refresh-secret-change-in-production
      ACCESS_TOKEN_EXPIRES_IN: 1h
      REFRESH_TOKEN_EXPIRES_IN: 30d
      REFRESH_TOKEN_ABSOLUTE_TTL_DAYS: 180
      REFRESH_TOKEN_COOKIE_NAME: refresh_token
      REFRESH_TOKEN_COOKIE_MAX_AGE_MS: 2592000000
      COOKIE_SECURE: false
      COOKIE_SAME_SITE: lax
      COOKIE_PATH: /
      COOKIE_DOMAIN: ''
      DB_HOST: postgres-account
      DB_PORT: 5432
      DB_NAME: battleship_account
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SYNCHRONIZE: false
      DB_LOGGING: false
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: myredispassword
      CHAT_HISTORY_LIMIT: 80
      CHAT_HISTORY_TTL_SECONDS: 43200
      SHOPAIKEY_API_KEY: ''
      SHOPAIKEY_GENAI_BASE_URL: https://api.shopaikey.com
      SHOPAIKEY_GENAI_MODEL: gemini-2.5-flash
    depends_on:
      - postgres-account
      - redis
    ports:
      - '3002:3000'

  game-service:
    build:
      context: ./services/game-service
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      NODE_ENV: development
      CLIENT_URL: http://localhost:5173,http://localhost:8088
      JWT_SECRET: unused-in-game-service
      JWT_REFRESH_SECRET: unused-in-game-service
      ACCESS_TOKEN_EXPIRES_IN: 1h
      REFRESH_TOKEN_EXPIRES_IN: 30d
      REFRESH_TOKEN_ABSOLUTE_TTL_DAYS: 180
      GRPC_AUTH_URL: auth-service:50051
      REFRESH_TOKEN_COOKIE_NAME: refresh_token
      REFRESH_TOKEN_COOKIE_MAX_AGE_MS: 2592000000
      COOKIE_SECURE: false
      COOKIE_SAME_SITE: lax
      COOKIE_PATH: /
      COOKIE_DOMAIN: ''
      DB_HOST: postgres-game
      DB_PORT: 5432
      DB_NAME: battleship_game
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SYNCHRONIZE: false
      DB_LOGGING: false
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: myredispassword
      CHAT_HISTORY_LIMIT: 80
      CHAT_HISTORY_TTL_SECONDS: 43200
      SHOPAIKEY_API_KEY: ''
      SHOPAIKEY_GENAI_BASE_URL: https://api.shopaikey.com
      SHOPAIKEY_GENAI_MODEL: gemini-2.5-flash
    depends_on:
      - postgres-game
      - redis
      - auth-service
    ports:
      - '3003:3000'

  forum-service:
    build:
      context: ./services/forum-service
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      NODE_ENV: development
      CLIENT_URL: http://localhost:5173,http://localhost:8088
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-jwt-refresh-secret-change-in-production
      ACCESS_TOKEN_EXPIRES_IN: 1h
      REFRESH_TOKEN_EXPIRES_IN: 30d
      REFRESH_TOKEN_ABSOLUTE_TTL_DAYS: 180
      REFRESH_TOKEN_COOKIE_NAME: refresh_token
      REFRESH_TOKEN_COOKIE_MAX_AGE_MS: 2592000000
      COOKIE_SECURE: false
      COOKIE_SAME_SITE: lax
      COOKIE_PATH: /
      COOKIE_DOMAIN: ''
      DB_HOST: postgres-forum
      DB_PORT: 5432
      DB_NAME: battleship_forum
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SYNCHRONIZE: false
      DB_LOGGING: false
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: myredispassword
      CHAT_HISTORY_LIMIT: 80
      CHAT_HISTORY_TTL_SECONDS: 43200
      SHOPAIKEY_API_KEY: ''
      SHOPAIKEY_GENAI_BASE_URL: https://api.shopaikey.com
      SHOPAIKEY_GENAI_MODEL: gemini-2.5-flash
    depends_on:
      - postgres-forum
      - redis
    ports:
      - '3004:3000'

  api-gateway:
    image: nginx:1.27-alpine
    depends_on:
      - auth-service
      - account-service
      - game-service
      - forum-service
    ports:
      - '8088:80'
    volumes:
      - ./infra/nginx/microservices-gateway.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_auth_data:
  postgres_account_data:
  postgres_game_data:
  postgres_forum_data:
